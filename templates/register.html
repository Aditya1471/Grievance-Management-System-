<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGMS - Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=6">
</head>

<body>
  <!-- ======= Navbar ======= -->
  <header>
    <div class="navbar">
      <div class="logo">OGMS</div>

      <nav class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('grievance') }}">Submit Grievance</a>
        <a href="{{ url_for('user_dashboard') }}">User Dashboard</a>
        <a href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
      </nav>

      <div class="auth-buttons">
        <a href="{{ url_for('login') }}" class="btn-login">Login</a>
        <a href="{{ url_for('register') }}" class="btn-register active">Register</a>
      </div>
    </div>
  </header>

  <!-- ======= Register Section ======= -->
  <section class="register-section">
    <div class="register-container">
      <h1>Create an Account</h1>
      <p class="form-info">Join OGMS to submit and track grievances easily.</p>

      <form method="POST" action="{{ url_for('register') }}">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>

        <label for="contact">Contact Number</label>
        <input type="text" id="contact" name="contact" placeholder="Enter contact number" required>

        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="">Select Role</option>
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>

        <button type="submit" class="btn-submit">Register</button>
      </form>

      <p class="register-link">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
      </p>
    </div>
  </section>

  <!-- ======= Footer ======= -->
  <footer>
    <p>© 2025 OGMS | Designed by Aditya Jha (B.Tech CSE - 3rd Year)</p>
  </footer>
</body>
</html>
